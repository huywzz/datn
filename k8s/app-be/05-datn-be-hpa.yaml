apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: datn-be-hpa
  namespace: datn
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: datn-be
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

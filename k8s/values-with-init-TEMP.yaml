# values-with-init-TEMP.yaml
tls:
  useSelfSigned: true

podSpec:
  initContainers:
    - name: wait-for-storage
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Waiting for storage to be ready after node restart..."
          echo "Sleeping 180 seconds to allow Longhorn to initialize..."
          sleep 180
          echo "Storage should be ready now"